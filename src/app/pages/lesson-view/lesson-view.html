@if (lesson(); as l) {
  <article class="lesson">
    <p class="crumb">
      <a routerLink="/">Courses</a>
      · <a [routerLink]="['/course', courseId()]">{{ course()?.title }}</a>
      · Lesson {{ index() + 1 }}
    </p>

    <markdown class="doc" [src]="docUrl()" [mermaid]="true" (ready)="onReady()" />

    @if (l.quiz; as quizPath) {
      <app-quiz [quizPath]="quizPath" [courseId]="courseId()" [lessonId]="l.id" />
    }

    <nav class="lesson-pager">
      @if (prev(); as p) {
        <a class="pager prev" [routerLink]="['/course', courseId(), 'lesson', p.id]">← {{ p.title }}</a>
      } @else {
        <a class="pager prev" [routerLink]="['/course', courseId()]">← Course overview</a>
      }
      @if (next(); as n) {
        <a class="pager next" [routerLink]="['/course', courseId(), 'lesson', n.id]">{{ n.title }} →</a>
      } @else {
        <a class="pager next" [routerLink]="['/course', courseId()]">Finish ✓</a>
      }
    </nav>
  </article>
} @else {
  <p class="loading">Loading lesson…</p>
}
